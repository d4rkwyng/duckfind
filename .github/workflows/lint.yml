name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, dom, gd, mbstring
      - name: Syntax-check all PHP files
        run: |
          find . -name '*.php' -print0 | xargs -0 -n1 -P4 php -l
