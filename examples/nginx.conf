# Example nginx server block for DuckFind.
# Web root is the repo's public/ directory; config.php lives one level up and is
# never exposed. Listens on plain HTTP so vintage browsers can connect directly.

server {
    listen 80;
    server_name duckfind.example;

    root /srv/duckfind/public;
    index index.php;

    # DuckFind has no rewrite needs; serve files, fall back to index.php.
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Never serve dotfiles.
    location ~ /\. { deny all; }
}
